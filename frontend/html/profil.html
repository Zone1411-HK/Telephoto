<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/color.css" />
        <link rel="stylesheet" href="../css/anim.css" />
        <link rel="stylesheet" href="../css/util.css" />
        <link rel="stylesheet" href="../css/ProfilePage/profile.css" />
        <!--!JavaScript-->
        <script src="/javascript/fetch.js"></script>
        <script src="node/socket.io/client-dist/socket.io.js"></script>
        <script src="../javascript/util.js" type="module"></script>
        <script src="../javascript/profilePage/profile.js" type="module"></script>
        <script src="../javascript/profilePage/index.js" type="module"></script>

        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root">
            <div id="profileInfos">
                <div id="profilePictureDiv">
                    <div id="profilePictureBackground">
                        <div id="profilePictureWrapper">
                            <div id="profilePictureBorder">
                                <img
                                    id="profilePicture"
                                    src="/profile_images/defaultProfile.svg"
                                    alt="Profil Kép"
                                />
                                <label class="hidden" id="profilePictureUploadLabel">
                                    <svg
                                        version="1.1"
                                        id="uploadSVG"
                                        xmlns="http://www.w3.org/2000/svg"
                                        xmlns:xlink="http://www.w3.org/1999/xlink"
                                        viewBox="0 0 50.00 50.00"
                                        enable-background="new 0 0 50 50"
                                        xml:space="preserve"
                                        fill="#000000"
                                        stroke-width="1.5"
                                    >
                                        <g id="SVGRepo_bgCarrier" stroke-width="0" />

                                        <g
                                            id="SVGRepo_tracerCarrier"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                        />

                                        <g id="SVGRepo_iconCarrier">
                                            <line
                                                fill="none"
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                x1="25"
                                                y1="10.5"
                                                x2="25"
                                                y2="39.5"
                                            />
                                            <circle fill="none" cx="25" cy="25" r="23.667" />
                                            <line
                                                fill="none"
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                x1="39.5"
                                                y1="25"
                                                x2="10.5"
                                                y2="25"
                                            />
                                        </g>
                                    </svg>
                                    <img class="hidden" id="tempImg" />
                                    <input
                                        type="file"
                                        accept=".jpg, .jpeg, .jfif, .png, .gif, .webp"
                                        id="profilePictureUpload"
                                        class="hidden"
                                        name="profilePic"
                                    />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="profileTextInfos">
                    <div id="profileNameDiv">
                        <p id="profileName" class="profileText"></p>
                    </div>
                    <div id="profileEmailDiv">
                        <p id="profileEmail" class="profileText"></p>
                    </div>
                    <div id="profileRegistrationDiv">
                        <p id="profileRegistration" class="profileText"></p>
                    </div>
                    <div id="profileBiographyDiv">
                        <textarea id="profileBiography" disabled maxlength="500"></textarea>
                    </div>
                    <div id="profileModifyDiv">
                        <button type="button" id="profileModify">Profil módosítása</button>
                        <button type="button" id="cancelProfileModification" class="hidden">
                            Elvetés
                        </button>
                        <button type="button" id="deleteProfile" class="hidden">
                            Profil Törlése
                        </button>
                        <button type="button" id="saveProfileModification" class="hidden">
                            Mentés
                        </button>
                    </div>
                </div>
            </div>
            <div id="postsWrapper">
                <div id="postTypeSelect">
                    <div class="postSVGWrapper activeType" id="postsByUser">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="feather feather-home"
                        >
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <div class="postSVGWrapper" id="likedPosts">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#314b49ff"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="feather feather-thumbs-up"
                        >
                            <path
                                d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"
                            ></path>
                        </svg>
                    </div>
                    <div class="postSVGWrapper" id="dislikedPosts">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#314b49ff"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="feather feather-thumbs-down"
                        >
                            <path
                                d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"
                            ></path>
                        </svg>
                    </div>
                    <div class="postSVGWrapper" id="savedPosts">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="feather feather-star"
                        >
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                            ></polygon>
                        </svg>
                    </div>
                </div>
                <div id="postsDiv">
                    <div id="posts"></div>
                </div>
            </div>
        </div>
        <nav id="nav">
            <a href="/" class="navButton"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-home"
                >
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Főoldal</span>
            </a>
            <a href="/map" class="navButton"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-map"
                >
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line></svg
                ><span>Térkép</span></a
            >
            <a href="/profile" id="profilGomb" class="navButton activeNav"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle></svg
                ><span>Profil</span></a
            >
            <div id="logoutWrapper" class="navButton">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-log-out"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </div>
        </nav>

        <div id="openedPostModal" class="hidden">
            <div id="closePost" class="closeButton">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-x"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div id="openedPost"></div>
        </div>

        <div id="commentModal" class="hidden" tabindex="-1">
            <div id="closeComments" class="closeButton">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-x"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div id="commentModalContentWrapper">
                <div id="commentModalContent"></div>
                <div id="newCommentWrapper">
                    <div id="boxShadowWrapper">
                        <textarea maxlength="150" id="commentTextarea"></textarea>
                        <div id="commentSvgWrapper">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-send"
                            >
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="deleteConfirmModal" class="customModal">
            <div id="deleteModalContent" class="customModalContent">
                <div class="customModalHeader">
                    <h1>vigyázat</h1>
                </div>
                <div class="customModalBody">
                    <p class="deleteWarning">
                        Biztosan szeretné végrehajtani ezt a műveletet?<br />Ez a művelet
                        visszafordíthatatlan
                    </p>
                    <div class="deleteButtons">
                        <input
                            type="button"
                            value="mégse"
                            class="deleteBtn deleteCancelBtn"
                            id="deleteCancel"
                        />
                        <input
                            type="button"
                            value="tovább"
                            class="deleteBtn deleteConfirmBtn"
                            id="deleteConfirm"
                        />
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
