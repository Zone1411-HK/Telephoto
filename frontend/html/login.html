<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="/css/LoginPage/login.css" />
        <!--!JavaScript-->
        <script src="../javascript/fetch.js"></script>
        <script src="../javascript/LoginPage/registration.js"></script>
        <script src="../javascript/LoginPage/login.js"></script>
        <script src="../javascript/LoginPage/index.js"></script>

        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="loginMain" id="login">
            <div class="login">
                <div class="loginDoboz">
                    <img src="/images/placeholder1.jpg" alt="PLACEHOLDER" class="img-fluid w-100" />
                </div>

                <div class="loginDoboz2">
                    <div class="loginTitle">
                        <h1>TELEPHOTO</h1>
                    </div>
                    <div class="loginForm" id="loginForm">
                        <form>
                            <div class="loginSorok">
                                <label for="loginUsername">Felhasználónév: </label>
                                <input id="loginUsername" type="text" class="inputMezo" />
                            </div>
                            <div class="loginSorok">
                                <label for="loginPassword">Jelszó: </label>
                                <input id="loginPassword" type="password" class="inputMezo" />
                            </div>

                            <div class="loginBtn">
                                <input id="loginButton" type="button" value="Bejelentkezés" />
                            </div>
                            <hr class="vonal" />
                            <div class="" id="regTextDiv">
                                <span class="loginRegText" id="regText">Regisztráció</span>
                            </div>
                        </form>
                    </div>
                    <div class="invisible" id="regForm">
                        <form>
                            <div class="loginSorok">
                                <label for="regUsername">Felhasználónév: </label>
                                <input id="regUsername" type="text" class="inputMezo" />
                            </div>
                            <div class="loginSorok">
                                <label for="regEmail">Email cím: </label>
                                <input id="regEmail" type="text" class="inputMezo" />
                            </div>
                            <div class="loginSorok">
                                <label for="regPassword">Jelszó: </label>
                                <input id="regPassword" type="password" class="inputMezo" />
                            </div>
                            <div class="loginSorok">
                                <label for="regConfirmPassword">Jelszó megerősítése: </label>
                                <input id="regConfirmPassword" type="password" class="inputMezo" />
                            </div>

                            <div class="loginBtn">
                                <input id="regButton" type="button" value="Regisztráció" />
                            </div>
                            <hr class="vonal" />
                            <div class="" id="loginTextDiv">
                                <span class="loginRegText" id="loginText">Bejelentkezés</span>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="loginDoboz">
                    <img src="/images/placeholder2.gif" alt="PLACEHOLDER" class="img-fluid w-100" />
                </div>
            </div>
        </div>
    </body>
</html>
