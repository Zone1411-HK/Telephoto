<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="/css/util.css" />
        <link rel="stylesheet" href="/css/anim.css" />
        <link rel="stylesheet" href="/css/color.css" />
        <link rel="stylesheet" href="/css/MapPage/map.css" />
        <link rel="stylesheet" href="node/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="node/leaflet.markercluster/dist/MarkerCluster.Default.css" />

        <!--!JavaScript-->
        <script src="/javascript/fetch.js"></script>
        <script src="node/leaflet/dist/leaflet.js"></script>
        <script src="node/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
        <script src="node/exifreader/dist/exif-reader.js"></script>
        <script src="/javascript/util.js"></script>
        <script src="/javascript/MapPage/map.js"></script>

        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root">
            <div id="filter">
                <div id="filterSVGWrapper">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="22"
                        height="22"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#21200e"
                        stroke-width="1.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-filter"
                        id="filterSVG"
                    >
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                    </svg>
                </div>
                <div id="filterOptions" class="openedFilter">
                    <div class="filterOptionRow">
                        <p>Szélességi fok</p>
                        <div class="filterOptionInputs">
                            <input type="text" id="minLat" class="filterLat" placeholder="-90" />
                            <input type="text" id="maxLat" class="filterLat" placeholder="90" />
                        </div>
                    </div>
                    <div class="filterOptionRow">
                        <span>Hosszúsági fok</span>
                        <div class="filterOptionInputs">
                            <input type="text" id="minLon" class="filterLon" placeholder="-180" />
                            <input type="text" id="maxLon" class="filterLon" placeholder="180" />
                        </div>
                    </div>
                    <input type="button" value="Visszaállítás" id="resetFilter" />
                </div>
            </div>
            <div id="map" tabindex="-1"></div>
            <nav id="nav">
                <a href="/" class="navButton"
                    ><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-home"
                    >
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Főoldal</span>
                </a>
                <a href="/map" class="navButton activeNav"
                    ><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#ffffff"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-map"
                    >
                        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                        <line x1="8" y1="2" x2="8" y2="18"></line>
                        <line x1="16" y1="6" x2="16" y2="22"></line></svg
                    ><span>Térkép</span></a
                >
                <a href="/profile" class="navButton" id="profilGomb"
                    ><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#ffffff"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-user"
                    >
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle></svg
                    ><span>Profil</span></a
                >
            </nav>
            <nav id="navMobile">
                <a href="/" class="mobileIcon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-home"
                    >
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
                <a href="/map" class="mobileIcon activeNav">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-map"
                    >
                        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                        <line x1="8" y1="2" x2="8" y2="18"></line>
                        <line x1="16" y1="6" x2="16" y2="22"></line>
                    </svg>
                </a>
                <a href="/profile" class="mobileIcon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-user"
                    >
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </nav>
        </div>

        <div id="postModal" class="postModal hidden">
            <div id="modalClose">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#212e00"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-x"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div class="modalContent" id="modalContent">
                <div class="post">
                    <div id="mediaWrapper">
                        <div class="slideshowControllerWrapper">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="32"
                                height="32"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#000"
                                stroke-width="1.75"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-arrow-left"
                                id="slideshowLeft"
                            >
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </div>
                        <div id="mediaSlideshowContent">
                            <img
                                src="../images/test.png"
                                class="slideshowItem slideshowItemActive"
                            />
                            <img src="../images/placeholder1.jpg" class="slideshowItem" />
                        </div>
                        <div class="slideshowControllerWrapper">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="32"
                                height="32"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#000"
                                stroke-width="1.75"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-arrow-right"
                                id="slideshowRight"
                            >
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </div>
                    </div>
                    <p>asd</p>
                </div>
            </div>
        </div>
    </body>
</html>
