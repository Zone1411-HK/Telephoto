<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="node/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="node/leaflet.markercluster/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="/css/color.css" />
        <link rel="stylesheet" href="/css/util.css" />
        <link rel="stylesheet" href="/css/anim.css" />
        <link rel="stylesheet" href="/css/MainPage/style.css" />
        <link rel="stylesheet" href="/css/MainPage/modal.css" />
        <link rel="stylesheet" href="/css/MainPage/chat.css" />

        <!--!JavaScript-->
        <script src="/javascript/fetch.js"></script>
        <script src="node/socket.io/client-dist/socket.io.js"></script>
        <script src="../javascript/util.js"></script>
        <script src="/javascript/MainPage/connect.js"></script>
        <script src="/javascript/MainPage/chat.js"></script>
        <script src="/javascript/MainPage/index.js"></script>
        <script src="/javascript/MainPage/scroll.js"></script>
        <script src="/javascript/MainPage/post.js"></script>
        <script src="/javascript/MainPage/uploadPost.js"></script>

        <script src="node/exifreader/dist/exif-reader.js"></script>
        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="mobileTitleWrapper">
            <h2 id="mobileTitle">Telephoto</h2>
        </div>
        <div class="home" id="home">
            <div class="chat-and-sort">
                <div id="titleWrapper">
                    <h1 id="title">Telephoto</h1>
                </div>
                <div id="rendezesContainer">
                    <div class="sortRow">
                        <h2 id="trendingTitle">Népszerű</h2>
                    </div>
                    <div class="sortRow">
                        <label for="today" class="trendingButton postLoad">
                            <span>Ma</span>
                            <input id="today" type="hidden" value="1" />
                        </label>
                        <label for="weekly" class="trendingButton postLoad">
                            <span>A héten</span>
                            <input id="weekly" type="hidden" value="7" />
                        </label>
                        <label for="monthly" class="trendingButton postLoad">
                            <span>Havi</span>
                            <input id="monthly" type="hidden" value="30" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <label for="annual" class="trendingButton postLoad">
                            <span>Idén</span>
                            <input id="annual" type="hidden" value="365" />
                        </label>
                        <label for="allTime" class="trendingButton activeSort postLoad">
                            <span>Bármikor</span>
                            <input id="allTime" type="hidden" value="36500" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="📍Budapest" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="#summervibes" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="📍Krakkó" />
                    </div>
                    <div class="sortRow">
                        <div class="postSearchWrapper postLoad">
                            <input id="postSearch" type="text" />
                            <div id="postSearchSVGWrapper">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="#ffffff"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="feather feather-search"
                                >
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="chatContainer">
                    <div id="newChatDiv">
                        <button id="newChat" type="button">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-plus-circle"
                            >
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="existingChats"></div>
                </div>
                <div id="openedChatWrapper" class="invisible">
                    <div id="openedChat"></div>
                </div>
            </div>
            <div class="posts-container" id="posts-container"></div>
        </div>
        <nav id="navMobile">
            <button type="button" class="mobileIcon">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-menu"
                >
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="/" class="mobileIcon activeNav">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-home"
                >
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <button class="mobileIcon" type="button" id="mobileUpload">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-plus-square"
                >
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
            </button>
            <a href="/map" class="mobileIcon">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-map"
                >
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
            </a>
            <a href="/profile" class="mobileIcon">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </nav>
        <nav id="nav">
            <a href="/" class="navButton activeNav"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-home"
                >
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Főoldal</span>
            </a>
            <a href="/map" class="navButton"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-map"
                >
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line></svg
                ><span>Térkép</span></a
            >
            <a href="/profile" class="navButton" id="profilGomb"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle></svg
                ><span>Profil</span></a
            >
            <button id="profilGomb" data-bs-toggle="modal" data-bs-target="#uploadModal">
                Profil
            </button>
        </nav>

        <div class="modal" id="uploadModal">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <p class="display-6 postTextDesign">Poszt előnézete</p>
                    </div>
                    <div class="modal-body">
                        <form enctype="multipart/form-data" id="uploadForm">
                            <!--! Valamiért a bootstrapes carousel bénán nézett ki-->
                            <div id="carouselContainer">
                                <div id="carouselContent"></div>
                                <div id="carouselControl"></div>
                            </div>
                            <input
                                type="file"
                                id="uploadFile"
                                accept=".mp4, .avi, .jpg, .jpeg, .jfif, .png, .gif, .webp, .hevc"
                                name="uploadFile"
                                multiple
                            />
                            <div id="uploadFeedbackDiv">
                                <p id="uploadFeedback" class="uploadFeedback"></p>
                            </div>
                            <button
                                type="button"
                                id="loadFiles"
                                class="postButtonDesign postButtonTextDesign"
                            >
                                Feltölt
                            </button>
                            <input
                                type="text"
                                id="uploadDescription"
                                placeholder="Ide írhatod a leírást"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <!--TODO Ide a tagaknak az inputja-->
                            <input
                                type="text"
                                id="uploadLocation"
                                placeholder="Ide írhatod a helyet"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                data-bs-dismiss="modal"
                                value="Mégse"
                                id="cancelPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                value="Poszt"
                                id="uploadPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="newChatModal">
            <div id="newChatContainer">
                <form id="newChatForm">
                    <div id="newChatImgDiv">
                        <div id="newChatImgWrapper">
                            <img id="newChatImg" src="../images/kep.jpg" />
                        </div>
                        <label for="newChatImgInput" id="newChatImgLabel">
                            Beszélgetés képe
                            <input
                                id="newChatImgInput"
                                type="file"
                                accept=".jpg, .jpeg, .jfif, .png, .webp"
                                name="img"
                                value="Feltöltés"
                            />
                        </label>
                    </div>
                    <input
                        type="text"
                        id="newChatName"
                        name="chatName"
                        placeholder="Beszélgetés neve"
                        maxlength="50"
                    />
                    <div id="newChatUsers">
                        <input
                            type="text"
                            placeholder="Kezdjen el gépelni"
                            maxlength="50"
                            id="newChatUserInput"
                        />
                        <div id="newChatUserWrapper">
                            <div id="newChatUserSuggestionList"></div>
                            <div id="newChatAddedUsers"></div>
                        </div>
                    </div>
                </form>
                <div id="newChatCreateCancel">
                    <input type="button" id="newChatCancel" value="Mégse" />
                    <input type="button" id="newChatCreate" value="Létrehozás" />
                </div>
            </div>
        </div>

        <div id="commentModal" class="hidden" tabindex="-1">
            <div id="closeComments" class="closeButton">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-x"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div id="commentModalContentWrapper">
                <div id="commentModalContent"></div>
                <div id="newCommentWrapper">
                    <div id="boxShadowWrapper">
                        <textarea maxlength="150" id="commentTextarea"></textarea>
                        <div id="commentSvgWrapper">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-send"
                            >
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
