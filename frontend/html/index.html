<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="node/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="node/leaflet.markercluster/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="/css/anim.css" />
        <link rel="stylesheet" href="/css/util.css" />
        <link rel="stylesheet" href="/css/MainPage/style.css" />
        <link rel="stylesheet" href="/css/MainPage/modal.css" />
        <link rel="stylesheet" href="/css/MainPage/chat.css" />

        <!--!JavaScript-->
        <script src="/javascript/fetch.js"></script>
        <script src="node/socket.io/client-dist/socket.io.js"></script>
        <script src="../javascript/util.js"></script>
        <script src="/javascript/MainPage/connect.js"></script>
        <script src="/javascript/MainPage/chat.js"></script>
        <script src="/javascript/MainPage/index.js"></script>
        <script src="/javascript/MainPage/darkroom.js"></script>
        <script src="/javascript/MainPage/post.js"></script>
        <script src="/javascript/MainPage/uploadPost.js"></script>

        <script src="node/exifreader/dist/exif-reader.js"></script>
        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="home" id="home">
            <div class="chat-and-sort">
                <div id="titleWrapper">
                    <h1 id="title">Telephoto</h1>
                </div>
                <div id="rendezesContainer">
                    <div class="sortRow">
                        <h2 id="trendingTitle">Trending</h2>
                    </div>
                    <div class="sortRow">
                        <label for="today" class="trendingButton">
                            <span>Ma</span>
                            <input id="today" type="hidden" value="1" />
                        </label>
                        <label for="weekly" class="trendingButton">
                            <span>A héten</span>
                            <input id="weekly" type="hidden" value="7" />
                        </label>
                        <label for="monthly" class="trendingButton">
                            <span>A hónapban</span>
                            <input id="monthly" type="hidden" value="30" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <label for="annual" class="trendingButton">
                            <span>Idén</span>
                            <input id="annual" type="hidden" value="365" />
                        </label>
                        <label for="allTime" class="trendingButton">
                            <span>Bármikor</span>
                            <input id="allTime" type="hidden" value="36500" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton" type="button" value="📍Budapest" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton" type="button" value="#summervibes" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton" type="button" value="📍Krakkó" />
                    </div>
                </div>
                <div id="chatContainer">
                    <div id="newChatDiv">
                        <button id="newChat" type="button">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#442222"
                                stroke-width="1"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-plus-circle"
                            >
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="existingChats"></div>
                </div>
                <div id="openedChatWrapper" class="invisible">
                    <div id="openedChat"></div>
                </div>
            </div>
            <div class="posts-container" id="posts-container"></div>
        </div>
        <nav id="nav">
            <a href="/" class="navButton">Főoldal</a>
            <a href="/map" class="navButton">Térkép</a>
            <a href="/profile" class="navButton" id="profilGomb">Profil</a>
            <button id="profilGomb" data-bs-toggle="modal" data-bs-target="#uploadModal">
                Profil
            </button>
        </nav>
        <div class="modal" id="uploadModal">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <p class="display-6 postTextDesign">Poszt előnézete</p>
                    </div>
                    <div class="modal-body">
                        <form enctype="multipart/form-data" id="uploadForm">
                            <!--! Valamiért a bootstrapes carousel bénán nézett ki-->
                            <div id="carouselContainer">
                                <div id="carouselContent"></div>
                                <div id="carouselControl"></div>
                            </div>
                            <input
                                type="file"
                                id="uploadFile"
                                accept=".mp4, .avi, .jpg, .jpeg, .jfif, .png, .gif, .webp, .hevc"
                                name="uploadFile"
                                multiple
                            />
                            <div id="uploadFeedbackDiv">
                                <p id="uploadFeedback" class="uploadFeedback"></p>
                            </div>
                            <button
                                type="button"
                                id="loadFiles"
                                class="postButtonDesign postButtonTextDesign"
                            >
                                Feltölt
                            </button>
                            <input
                                type="text"
                                id="uploadDescription"
                                placeholder="Ide írhatod a leírást"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <!--TODO Ide a tagaknak az inputja-->
                            <input
                                type="text"
                                id="uploadLocation"
                                placeholder="Ide írhatod a helyet"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                data-bs-dismiss="modal"
                                value="Mégse"
                                id="cancelPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                value="Poszt"
                                id="uploadPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="newChatModal">
            <div id="newChatContainer">
                <form id="newChatForm">
                    <div id="newChatImgDiv">
                        <div id="newChatImgWrapper">
                            <img id="newChatImg" src="../images/kep.jpg" />
                        </div>
                        <label for="newChatImgInput" id="newChatImgLabel">
                            Beszélgetés képe
                            <input
                                id="newChatImgInput"
                                type="file"
                                accept=".jpg, .jpeg, .jfif, .png, .webp"
                                name="img"
                                value="Feltöltés"
                            />
                        </label>
                    </div>
                    <input
                        type="text"
                        id="newChatName"
                        name="chatName"
                        placeholder="Beszélgetés neve"
                        maxlength="50"
                    />
                    <div id="newChatUsers">
                        <input
                            type="text"
                            placeholder="Kezdjen el gépelni"
                            maxlength="50"
                            id="newChatUserInput"
                        />
                        <div id="newChatUserWrapper">
                            <div id="newChatUserSuggestionList"></div>
                            <div id="newChatAddedUsers"></div>
                        </div>
                    </div>
                </form>
                <div id="newChatCreateCancel">
                    <input type="button" id="newChatCancel" value="Mégse" />
                    <input type="button" id="newChatCreate" value="Létrehozás" />
                </div>
            </div>
        </div>
    </body>
</html>
