<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TELEPHOTO</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="node/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="node/leaflet.markercluster/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="/css/color.css" />
        <link rel="stylesheet" href="/css/util.css" />
        <link rel="stylesheet" href="/css/anim.css" />
        <link rel="stylesheet" href="/css/MainPage/style.css" />
        <!--link rel="stylesheet" href="/css/MainPage/modal.css" /-->
        <link rel="stylesheet" href="/css/MainPage/chat.css" />

        <!--!JavaScript-->
        <script src="/javascript/fetch.js" type="module"></script>
        <script src="node/socket.io/client-dist/socket.io.js"></script>
        <script src="../javascript/util.js" type="module"></script>
        <script src="/javascript/MainPage/chat.js" type="module"></script>
        <script src="/javascript/MainPage/scroll.js" type="module"></script>
        <script src="/javascript/MainPage/post.js" type="module"></script>
        <script src="/javascript/MainPage/uploadPost.js" type="module"></script>
        <script src="/javascript/MainPage/index.js" type="module"></script>
        <script src="/javascript/logoutUser.js" type="module"></script>

        <script src="node/exifreader/dist/exif-reader.js"></script>
        <!--Font Style-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="mobileTitleWrapper">
            <h2 id="mobileTitle">Telephoto</h2>
        </div>
        <div class="home" id="home">
            <div class="chat-and-sort">
                <div id="titleWrapper">
                    <h1 id="title">Telephoto</h1>
                </div>
                <div id="rendezesContainer">
                    <div class="sortRow">
                        <h2 id="trendingTitle">Népszerű</h2>
                    </div>
                    <div class="sortRow">
                        <label for="today" class="trendingButton postLoad">
                            <span>Mai</span>
                            <input id="today" type="hidden" value="1" />
                        </label>
                        <label for="weekly" class="trendingButton postLoad">
                            <span>Heti</span>
                            <input id="weekly" type="hidden" value="7" />
                        </label>
                        <label for="monthly" class="trendingButton postLoad">
                            <span>Havi</span>
                            <input id="monthly" type="hidden" value="30" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <label for="annual" class="trendingButton postLoad">
                            <span>Idei</span>
                            <input id="annual" type="hidden" value="365" />
                        </label>
                        <label for="allTime" class="trendingButton activeSort postLoad">
                            <span>Bármikor</span>
                            <input id="allTime" type="hidden" value="36500" />
                        </label>
                    </div>
                    <div class="sortRow">
                        <h2 class="postSortTitle">Helyek</h2>
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="" />
                    </div>
                    <div class="sortRow">
                        <input class="egyebButton postLoad" type="button" value="" />
                    </div>
                    <div class="sortRow">
                        <div class="postSearchWrapper postLoad">
                            <input id="postSearch" type="text" />
                            <div id="postSearchSVGWrapper">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="#ffffff"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="feather feather-search"
                                >
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="chatContainer">
                    <div id="newChatDiv">
                        <button id="newChat" type="button">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-plus-circle"
                            >
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="existingChats"></div>
                </div>
                <div id="openedChatWrapper" class="invisible">
                    <div id="openedChat"></div>
                </div>
            </div>
            <div class="posts-container" id="posts-container"></div>
            <button id="openPostUpload">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-upload"
                >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
        </div>

        <nav id="nav">
            <a href="/" class="navButton activeNav"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-home"
                >
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Főoldal</span>
            </a>
            <a href="/map" class="navButton"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-map"
                >
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line></svg
                ><span>Térkép</span></a
            >
            <a href="/profile" class="navButton" id="profilGomb"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle></svg
                ><span>Profil</span></a
            >
        </nav>

        <nav id="navMobile">
            <button type="button" class="mobileIcon" data-opened="false" id="openSort">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-menu"
                >
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="/" class="mobileIcon activeNav">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-home"
                >
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <button class="mobileIcon" type="button" id="mobileUpload">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-plus-square"
                >
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
            </button>
            <a href="/map" class="mobileIcon">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-map"
                >
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
            </a>
            <a href="/profile" class="mobileIcon" id="mobileProfilGomb">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-user"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </nav>

        <div class="hidden" id="mobileSort">
            <div class="postSearchWrapper postLoad">
                <input id="postSearchMobile" type="text" />
                <div id="postSearchSVGWrapperMobile">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#ffffff"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="feather feather-search"
                    >
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </div>
            <label for="todayMobile" class="trendingButton postLoad">
                <span>Mai</span>
                <input id="todayMobile" type="hidden" value="1" />
            </label>
            <label for="weeklyMobile" class="trendingButton postLoad">
                <span>Heti</span>
                <input id="weeklyMobile" type="hidden" value="7" />
            </label>
            <label for="monthlyMobile" class="trendingButton postLoad">
                <span>Havi</span>
                <input id="monthlyMobile" type="hidden" value="30" />
            </label>
            <label for="annualMobile" class="trendingButton postLoad">
                <span>Idei</span>
                <input id="annualMobile" type="hidden" value="365" />
            </label>
            <label for="allTimeMobile" class="trendingButton postLoad">
                <span>Bármikor</span>
                <input id="allTimeMobile" type="hidden" value="36500" />
            </label>
        </div>

        <div id="uploadModal" class="hidden">
            <div id="flash" class="hidden"></div>
            <div id="uploadModalContent">
                <div id="cameraDecoration">Telephoto</div>

                <form enctype="multipart/form-data" id="uploadForm">
                    <div id="tempSlideshowWrapper">
                        <div class="uploadInfo">Itt láthatja a feltöltött képeket</div>
                    </div>
                    <div id="uploadLocationWrapper">
                        <label for="uploadFile" class="uploadFileLabel">
                            <div id="uploadFileLabelText">Fájl feltöltése</div>
                            <div id="uploadFeedback"></div>
                            <input
                                type="file"
                                id="uploadFile"
                                accept=".mp4, .avi, .jpg, .jpeg, .jfif, .png, .gif, .webp, .hevc"
                                name="uploadFile"
                                multiple
                                hidden
                            />
                        </label>
                        <label for="uploadLocation" class="uploadLocation">
                            <span>Helyszín</span>
                            <input
                                type="text"
                                name="uploadLocation"
                                id="uploadLocation"
                                placeholder="Ide írhatja a helyszínt"
                                maxlength="176"
                            />
                        </label>
                    </div>

                    <div id="descriptionTags">
                        <label for="uploadDescription" class="uploadDescription"
                            ><span>Leírás:</span>
                            <textarea
                                id="uploadDescription"
                                name="uploadDescription"
                                placeholder="Ide írhatja a leírást"
                                maxlength="500"
                            ></textarea>
                            <div id="descriptionLength">0/500</div>
                        </label>
                        <label for="uploadTags" class="uploadTags"
                            ><span>Tagek:</span>
                            <div id="tagWrapper">
                                <input
                                    id="uploadTags"
                                    name="uploadTags"
                                    placeholder="Nyomjon enter-t a tag hozzáadásához"
                                    maxlength="50"
                                />
                                <div id="forTags"></div>
                            </div>
                        </label>
                    </div>
                </form>
                <div id="cancelUpload">
                    <button type="button" id="cancelPost">Elvetés</button>
                    <button type="button" id="uploadPost" class="disabledButton">Feltöltés</button>
                </div>
            </div>
        </div>

        <div id="newChatModal" class="hidden">
            <div id="newChatContainer">
                <form id="newChatForm">
                    <label for="newChatImgInput" id="newChatImgLabel">
                        <div id="newChatImgWrapper">
                            <img id="newChatImg" src="../images/circlePlus.png" />
                        </div>
                        <span>Beszélgetés képe</span>
                        <input
                            id="newChatImgInput"
                            type="file"
                            accept=".jpg, .jpeg, .jfif, .png, .webp"
                            name="img"
                            value="Feltöltés"
                        />
                    </label>
                    <input
                        type="text"
                        id="newChatName"
                        name="chatName"
                        placeholder="Beszélgetés neve"
                        maxlength="50"
                    />
                    <div id="newChatUsers">
                        <input
                            type="text"
                            placeholder="Felhasználó hozzáadása"
                            maxlength="50"
                            id="newChatUserInput"
                        />
                        <div id="newChatUserWrapper">
                            <div id="newChatUserSuggestionList"></div>
                            <div id="newChatAddedUsers"></div>
                        </div>
                    </div>
                </form>
                <div id="newChatCreateCancel">
                    <input type="button" id="newChatCancel" value="Mégse" />
                    <input type="button" id="newChatCreate" value="Létrehozás" />
                </div>
            </div>
        </div>

        <div id="commentModal" class="hidden" tabindex="-1">
            <div id="closeComments" class="closeButton">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-x"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div id="commentModalContentWrapper">
                <div id="commentModalContent"></div>
                <div id="newCommentWrapper">
                    <div id="boxShadowWrapper">
                        <textarea maxlength="150" id="commentTextarea"></textarea>
                        <div id="commentSvgWrapper">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="feather feather-send"
                            >
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
