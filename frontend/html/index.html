            <div class="home" id="home">
                <div class="chat-and-sort">
                    <div id="titleWrapper">
                        <h1 id="title">Telephoto</h1>
                    </div>
                    <div id="rendezesContainer">
                        <div id="rendezesTrending">
                            <h2 id="trendingTitle">Trending</h2>
                            <div id="rendezesButtonWrapper">
                                <input class="trendingButton" type="button" value="Ma" />
                                <input class="trendingButton" type="button" value="A héten" />
                                <input class="trendingButton" type="button" value="A hónapban" />
                                <input class="trendingButton" type="button" value="Idén" />
                                <input class="trendingButton" type="button" value="Bármikor" />
                            </div>
                        </div>
                        <div id="rendezesEgyeb">
                            <input class="egyebButton" type="button" value="📍Budapest" />
                            <input class="egyebButton" type="button" value="#summervibes" />
                            <input class="egyebButton" type="button" value="📍Krakkó" />
                        </div>
                    </div>
                    <div id="chatContainer">
                        <div id="newChatDiv">
                            <button id="newChat" type="button">
                                <img src="/images/plus-circle(2).svg" alt="Új chat" />
                            </button>
                        </div>
                        <div id="existingChats"></div>
                    </div>
                    <div id="openedChatWrapper" class="invisible">
                        <div id="openedChat"></div>
                    </div>
                </div>
                <div class="posts-container" id="posts-container">
                </div>
            </div>
                    <nav class="navbar navbar-expand-lg" id="navbar">
            <div class="container-fluid p-0" id="navBarColor">
                <a class="navbar-brand m-0"
                    ><input
                        type="button"
                        id="homepage"
                        value="Főoldal"
                        class="navBarButton rightNavBorder"
                /></a>

                <a class="navbar-brand m-0"
                    ><input
                        type="button"
                        id="mapButton"
                        value="Térkép"
                        class="navBarButton rightNavBorder"
                /></a>
                <a class="navbar-brand m-0"
                    ><input
                        type="button"
                        id="postButton"
                        value="Posztolás"
                        class="navBarButton rightNavBorder"
                        data-bs-toggle="modal"
                        data-bs-target="#uploadModal"
                /></a>
                <a class="navbar-brand m-0"
                    ><input type="button" id="profile" value="Profil" class="navBarButton noBorder"
                /></a>
            </div>
        </nav>

        <div class="modal" id="uploadModal">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <p class="display-6 postTextDesign">Poszt előnézete</p>
                    </div>
                    <div class="modal-body">
                        <form enctype="multipart/form-data" id="uploadForm">
                            <!--! Valamiért a bootstrapes carousel bénán nézett ki-->
                            <div id="carouselContainer">
                                <div id="carouselContent"></div>
                                <div id="carouselControl"></div>
                            </div>
                            <input
                                type="file"
                                id="uploadFile"
                                accept=".mp4, .avi, .jpg, .jpeg, .jfif, .png, .gif, .webp, .hevc"
                                name="uploadFile"
                                multiple
                            />
                            <div id="uploadFeedbackDiv">
                                <p id="uploadFeedback" class="uploadFeedback"></p>
                            </div>
                            <button
                                type="button"
                                id="loadFiles"
                                class="postButtonDesign postButtonTextDesign"
                            >
                                Feltölt
                            </button>
                            <input
                                type="text"
                                id="uploadDescription"
                                placeholder="Ide írhatod a leírást"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <!--TODO Ide a tagaknak az inputja-->
                            <input
                                type="text"
                                id="uploadLocation"
                                placeholder="Ide írhatod a helyet"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                data-bs-dismiss="modal"
                                value="Mégse"
                                id="cancelPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                            <input
                                type="button"
                                value="Poszt"
                                id="uploadPost"
                                class="postButtonDesign postButtonTextDesign"
                            />
                        </form>
                    </div>
                </div>
            </div>
        </div>


        <div id="newChatModal">
            <div id="newChatContainer">
                <form id="newChatForm">
                    <div id="newChatImgDiv">
                        <div id="newChatImgWrapper">
                            <img id="newChatImg" src="../images/kep.jpg" />
                        </div>
                        <label for="newChatImgInput" id="newChatImgLabel">
                            Beszélgetés képe
                            <input
                                id="newChatImgInput"
                                type="file"
                                accept=".jpg, .jpeg, .jfif, .png, .webp"
                                name="img"
                                value="Feltöltés"
                            />
                        </label>
                    </div>
                    <input
                        type="text"
                        id="newChatName"
                        name="chatName"
                        placeholder="Beszélgetés neve"
                        maxlength="50"
                    />
                    <div id="newChatUsers">
                        <input
                            type="text"
                            placeholder="Kezdjen el gépelni"
                            maxlength="50"
                            id="newChatUserInput"
                        />
                        <div id="newChatUserWrapper">
                            <div id="newChatUserSuggestionList"></div>
                            <div id="newChatAddedUsers"></div>
                        </div>
                    </div>
                </form>
                <div id="newChatCreateCancel">
                    <input type="button" id="newChatCancel" value="Mégse" />
                    <input type="button" id="newChatCreate" value="Létrehozás" />
                </div>
            </div>
        </div>
    </body>
